services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DB_HOST: db
      DB_PORT: 3306
      CORS_ORIGINS: https://${DOMAIN},http://localhost,capacitor://localhost
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://${DOMAIN}/api
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  mysql-data:
  caddy-data:
  caddy-config:
